name: Manual Release (Beta)

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: "Release type (always beta for testing)"
        type: choice
        required: true
        default: "beta"
        options:
          - "beta"
      createRelease:
        description: "Create GitHub Release with changelog"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  actions: read

jobs:
  check-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check latest CI workflow run
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              per_page: 1
            });
            
            if (runs.workflow_runs.length === 0) {
              core.setFailed('No CI workflow runs found on main branch');
              return;
            }
            
            const latestRun = runs.workflow_runs[0];
            console.log(`Latest CI run: ${latestRun.html_url}`);
            console.log(`Status: ${latestRun.status}`);
            console.log(`Conclusion: ${latestRun.conclusion}`);
            
            if (latestRun.status !== 'completed') {
              core.setFailed('Latest CI run is still in progress. Wait for it to complete.');
              return;
            }
            
            if (latestRun.conclusion !== 'success') {
              core.setFailed(`Latest CI run failed (${latestRun.conclusion}). Fix CI before releasing.`);
              return;
            }
            
            console.log('Latest CI run passed');

  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-ci
    steps:
      # ─── Checkout with full history for changelog ───
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Setup tools ───
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Configure Git for commit author ───
      - name: Configure Git author
        run: |
          git config user.name "vernonthedev"
          git config user.email "techjaja2@gmail.com"

      # ─── Generate CHANGELOG from ALL conventional commits ───
      - name: Generate full changelog
        id: changelog
        run: |
          # Get the last tag (if any)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            echo "Last tag: $LAST_TAG"
            # Generate changelog since last tag
            pnpm exec conventional-changelog -p ./.changelogrc.js -i CHANGELOG.md -s -r 0 --from $LAST_TAG
          else
            echo "No previous tag found, generating full changelog"
            pnpm exec conventional-changelog -p ./.changelogrc.js -i CHANGELOG.md -s -r 0 --first-release
          fi
          
          # Read the new changelog entry (what was added)
          NEW_CHANGELOG=$(cat CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ─── Build everything ───
      - name: Build NAPI Rust binary
        run: pnpm napi-build

      - name: Build TypeScript
        run: pnpm build

      - name: Run tests
        run: pnpm test

      # ─── Determine version bump from commits ───
      - name: Determine version bump
        id: version
        run: |
          # Analyze commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi
          
          echo "Commits since last tag:"
          echo "$COMMITS"
          
          # Determine bump: feat! = major, feat = minor, fix = patch
          BUMP="patch"
          echo "$COMMITS" | grep -q "^feat!" && BUMP="major"
          echo "$COMMITS" | grep -q "^feat" && [ "$BUMP" != "major" ] && BUMP="minor"
          echo "$COMMITS" | grep -q "^fix" && [ "$BUMP" = "patch" ] && BUMP="patch"
          
          # For beta, always patch
          BUMP="patch"
          
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          if [ "$BUMP" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          # Add beta suffix
          NEW_VERSION="${NEW_VERSION}-beta.0"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ─── Update package.json and Cargo.toml versions ───
      - name: Update version files
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          
          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          
          # Update rust/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" rust/Cargo.toml
          
          echo "Updated to version: $NEW_VERSION"

      # ─── Commit version bump + changelog ───
      - name: Commit version bump
        run: |
          git add package.json rust/Cargo.toml CHANGELOG.md
          git commit -m "chore: release ${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes to commit"

      # ─── Publish to GitHub Packages (beta tag) ───
      - name: Publish to GitHub Packages
        run: pnpm exec napi publish --platform --release --no-gh-release --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Create GitHub Release ───
      - name: Create GitHub Release
        if: ${{ github.event.inputs.createRelease }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          body_path: CHANGELOG.md
          prerelease: true
          make_latest: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Push commits back to main ───
      - name: Push to main
        run: |
          git push origin main