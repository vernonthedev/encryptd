name: Manual Release (Beta)

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: "Release type (always beta for testing)"
        type: choice
        required: true
        default: "beta"
        options:
          - "beta"
      createRelease:
        description: "Create GitHub Release with changelog"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  actions: read

# Updated to fix workflow_dispatch trigger recognition

jobs:
  check-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check latest CI workflow run
        id: check-ci
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 313015799,
              branch: 'main',
              status: 'completed',
              per_page: 1
            });
            
            if (runs.workflow_runs.length === 0) {
              core.setFailed('No CI runs found on main branch');
              return;
            }
            
            const latestRun = runs.workflow_runs[0];
            console.log(`Latest CI run: ${latestRun.html_url} - ${latestRun.conclusion}`);
            
            if (latestRun.conclusion !== 'success') {
              core.setFailed(`Latest CI run failed (${latestRun.conclusion}). Manual release blocked.`);
              return;
            }
            
            console.log('Latest CI run passed - proceeding with release');

  version-bump:
    name: Determine version and bump
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check-ci
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Configure Git author
        run: |
          git config user.name "vernonthedev"
          git config user.email "techjaja2@gmail.com"

      - name: Generate full changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            echo "Last tag: $LAST_TAG"
            pnpm exec conventional-changelog -p ./.changelogrc.js -i CHANGELOG.md -s -r 0 --from $LAST_TAG
          else
            echo "No previous tag found, generating full changelog"
            pnpm exec conventional-changelog -p ./.changelogrc.js -i CHANGELOG.md -s -r 0 --first-release
          fi
          
          NEW_CHANGELOG=$(cat CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi
          
          echo "Commits since last tag:"
          echo "$COMMITS"
          
          BUMP="patch"
          echo "$COMMITS" | grep -q "^feat!" && BUMP="major"
          echo "$COMMITS" | grep -q "^feat" && [ "$BUMP" != "major" ] && BUMP="minor"
          echo "$COMMITS" | grep -q "^fix" && [ "$BUMP" = "patch" ] && BUMP="patch"
          
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          if [ "$BUMP" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          NEW_VERSION="${NEW_VERSION}-beta.0"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version files
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" rust/Cargo.toml
          
          echo "Updated to version: $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add package.json rust/Cargo.toml CHANGELOG.md
          git commit -m "chore: release ${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes to commit"

            - name: Create and push version tag
              run: |
                git tag v${{ steps.version.outputs.new_version }}
                git push origin v${{ steps.version.outputs.new_version }}

            - name: Push version bump
              run: git push origin main

  release:
    name: Build Platform Package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [check-ci, version-bump]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
          - name: Checkout version tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
              ref: v${{ needs.version-bump.outputs.new_version }}

          - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git author
        run: |
          git config user.name "vernonthedev"
          git config user.email "techjaja2@gmail.com"

      - name: Build NAPI Rust binary
        run: pnpm napi-build

      - name: Build TypeScript
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Prepare npm packages
        run: pnpm exec napi pre-publish

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-${{ matrix.target }}
          path: npm/*.tgz
          retention-days: 1

      - name: Publish platform package to npm registry
        run: |
          for pkg in npm/*.tgz; do
            echo "Publishing $pkg"
            npm publish "$pkg" --registry=https://npm.pkg.github.com --tag=beta
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-ci, version-bump, release]
    if: ${{ github.event.inputs.createRelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-package-*
          path: all-artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          find all-artifacts -name "*.tgz" | sort

      - name: Create GitHub Release with all platform assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.new_version }}
          name: v${{ needs.version-bump.outputs.new_version }}
          body: ${{ needs.version-bump.outputs.changelog }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: all-artifacts/**/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}