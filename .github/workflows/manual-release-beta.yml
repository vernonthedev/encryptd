name: Manual Release (Beta)

# Triggered manually from the GitHub UI (browser). Pre-release only.
on:
  workflow_dispatch:
    inputs:
      createRelease:
        description: "Create a GitHub Release with the built assets attached"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  check-ci:
    name: Verify latest CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check latest CI run on main
        id: check-ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId,conclusion,url 2>/dev/null || echo "[]")

          COUNT=$(echo "$RUN" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).length)}catch{console.log(0)}})")
          if [ "$COUNT" -eq 0 ]; then
            echo "No successful CI run found on main yet - allowing release on a fresh repo."
            exit 0
          fi
          echo "Latest CI run on main is green - proceeding."

  version-bump:
    name: Determine version, changelog and tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check-ci
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Configure Git
        run: |
          git config user.name "vernonthedev"
          git config user.email "techjaja2@gmail.com"

      - name: Determine next beta version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version" | sed 's/^v//')
          BASE="${CURRENT_VERSION%%-*}"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" --reverse)
            LAST_BASE="${LAST_TAG#v}"
            LAST_BASE="${LAST_BASE%%-*}"
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
            LAST_BASE=""
          fi

          echo "Current: $CURRENT_VERSION | Base: $BASE | Last tag: ${LAST_TAG:-none}"

          # Auto bump from conventional commits (since the previous tag).
          BUMP="patch"
          echo "$COMMITS" | grep -qiE '^feat(\([^)]*\))?!:' && BUMP="major"
          if [ "$BUMP" != "major" ]; then
            echo "$COMMITS" | grep -qiE '^feat(\([^)]*\))?!?:' && BUMP="minor"
          fi

          if [ -n "$LAST_TAG" ]; then
            # Build the new base version from the previous tag's base + bump.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_BASE"
            case "$BUMP" in
              major) NEW_BASE="$((MAJOR + 1)).0.0" ;;
              minor) NEW_BASE="${MAJOR}.$((MINOR + 1)).0" ;;
              *)     NEW_BASE="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
            # Find the highest -beta.N already published for this base, then +1.
            HIGHEST=$(git tag --list "v${NEW_BASE}-beta.*" \
              | sed -E "s/^v${NEW_BASE}-beta\.([0-9]+)$/\1/" \
              | sort -n | tail -1)
            NEXT_BETA=$(( ${HIGHEST:-0} + 1 ))
            NEW_VERSION="${NEW_BASE}-beta.${NEXT_BETA}"
          else
            # Fresh start: use the package base version as-is (0.0.1 -> 0.0.1-beta.0).
            NEW_VERSION="${BASE}-beta.0"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEW_VERSION (tag v$NEW_VERSION)"

      - name: Generate changelog section
        run: node scripts/generate-changelog.mjs "${{ steps.version.outputs.version }}"

      - name: Update version files
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          BASE_VERSION="${NEW_VERSION%-beta.*}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const p = 'rust/Cargo.toml';
            const t = fs.readFileSync(p, 'utf8').replace(/^version = \".*\"/m, 'version = \"$BASE_VERSION\"');
            fs.writeFileSync(p, t);
          "
          echo "package.json -> $NEW_VERSION | Cargo.toml -> $BASE_VERSION"

      - name: Commit version bump
        run: |
          git add package.json rust/Cargo.toml CHANGELOG.md RELEASE_NOTES.md
          git commit -m "chore: release ${{ steps.version.outputs.version }} [skip ci]" || echo "Nothing to commit"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          git push origin main

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 7

  release:
    name: Build and publish (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    needs: version-bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout at version tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.version-bump.outputs.tag }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build NAPI binary
        run: pnpm exec napi build --manifest-path rust/Cargo.toml --platform --release --target ${{ matrix.target }}

      - name: Build TypeScript
        run: pnpm run build

      - name: Pack the package (artifact + dry verification)
        run: |
          mkdir -p npm
          npm pack --pack-destination npm 2>&1 | tail -3
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages (beta)
        if: matrix.os == 'ubuntu-latest'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish --tag beta --registry=https://npm.pkg.github.com .

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-package-${{ matrix.target }}
          path: npm/*.tgz
          retention-days: 7

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: version-bump
    if: ${{ inputs.createRelease == true }}
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: platform-package-*
          path: ./artifacts
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: ./notes

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.version-bump.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release ${{ needs.version-bump.outputs.tag }}" \
            --notes-file ./notes/RELEASE_NOTES.md \
            --prerelease \
            ./artifacts/*.tgz
